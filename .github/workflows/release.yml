name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the zip but don't upload"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag $tag does not match manifest.json version $manifest"
            exit 1
          fi

      - run: npm run build

      - name: Upload zip as release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-pkg/*.zip
          generate_release_notes: true

      # Chrome Web Store publish.
      # Requires four repo secrets, obtained from the publishing Google account
      # via the Web Store API setup flow:
      #   CHROME_EXTENSION_ID  - the extension's ID once the listing exists
      #   CHROME_CLIENT_ID     - OAuth client id
      #   CHROME_CLIENT_SECRET - OAuth client secret
      #   CHROME_REFRESH_TOKEN - refresh token for that client
      # See https://developer.chrome.com/docs/webstore/using-api
      - name: Publish to Chrome Web Store
        if: |
          startsWith(github.ref, 'refs/tags/v') &&
          inputs.dry_run != true &&
          env.CHROME_EXTENSION_ID != ''
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source dist-pkg/*.zip \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN" \
            --auto-publish
